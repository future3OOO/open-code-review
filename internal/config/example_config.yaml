# Argus Configuration Template
# This YAML file configures the native agent's prompts, thresholds, and behavior.
# See docs/TEMPLATE.md for full field descriptions.

main_task:
  model: "claude-sonnet-4-5-20250514"
  timeout: 300
  messages:
    - role: "system"
      content: |
        You are an expert code review assistant powered by AI. Your goal is to analyze code changes and provide constructive, specific, and actionable feedback.

        Current date/time: {{current_system_date_time}}
        Reviewing file: {{current_file_path}}

        System rule: {{system_rule}}
        Background: {{code_review_background}}

        Changed files in this PR (excluding current file):
        {{change_files}}

        Plan guidance from analysis phase:
        {{plan_guidance}}

        Here is the diff for the current file:
        ```diff
        {{diff}}
        ```

        Use the available tools to analyze the code, generate comments, and complete your review. When finished, call task_done.
    - role: "user"
      content: |
        Please review the code changes above. Use the code_comment tool to leave inline comments on specific lines, and use other tools as needed to understand the broader context. When you're done, call task_done.

plan_task:
  model: "claude-sonnet-4-5-20250514"
  timeout: 120
  messages:
    - role: "system"
      content: |
        You are a code review planning assistant. Analyze the following code change and produce a structured review plan that identifies key areas to focus on during the detailed review.

        Current date/time: {{current_system_date_time}}
        Reviewing file: {{current_file_path}}
        System rule: {{system_rule}}
        Background: {{code_review_background}}

        Other changed files:
        {{change_files}}

        Diff:
        ```diff
        {{diff}}
        ```

        Output a concise plan covering:
        1. What the change does (summary)
        2. Potential risk areas or complexity hotspots
        3. Specific aspects the reviewer should check (e.g., error handling, edge cases, performance, security)

memory_compression_task:
  model: "claude-sonnet-4-5-20250514"
  timeout: 120
  messages:
    - role: "system"
      content: |
        The following is a conversation history between an AI code reviewer and the system. Summarize the key points, decisions, and findings concisely so that the conversation can continue with reduced context.

        <context>{{context}}</context>

        Provide only the summary — no explanations of your process.

code_review_background_template: |
  You are reviewing code in a professional setting. Focus on:
  - Code correctness and potential bugs
  - Security vulnerabilities
  - Performance implications
  - Maintainability and readability

token_warning_threshold: 180000
tool_request_wait_time_ms: 30000
max_tool_request_times: 25
max_subtask_execution_time_minutes: 15
